# Telegram-Claude-Bridge Configuration

telegram:
  # Bot token from @BotFather
  bot_token: "8730903546:AAFl_vWSN_OUUTLuUONzvV0zKyZaecJk54E"

  # Max message length for Telegram (will auto-split longer messages)
  max_message_length: 4096

# Authorized users (Telegram user IDs)
whitelist:
  - 1301659279
  # - 987654321

# Claude Code CLI settings
claude:
  # Path to claude CLI (leave empty if in PATH)
  cli_path: ""

  # Timeout in seconds for Claude responses
  timeout: 300

  # Output format: "text" for --print, "stream-json" for --output-format stream-json
  output_format: "text"

  # MCP server config (passed via --mcp-config to Claude CLI)
  mcp_servers:
    mcpServers:
      byMCP:
        type: stdio
        command: py
        args: ["-3.14", "C:/Users/Micha/claude/byMCP/server.py"]

# Session settings
session:
  # Minutes of inactivity before starting a new conversation
  timeout_minutes: 60
